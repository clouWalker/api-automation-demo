name: Run pytest on push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-html

    - name: Run mock server in background
      run: |
        python mock_server.py &
        # 等待服务器就绪，最多 30 秒
        for i in {1..30}; do
          if curl -fsS http://localhost:3000/users >/dev/null 2>&1; then
            echo "Mock server is ready"
            break
          fi
          sleep 1
        done

    - name: Run tests with report
      run: |
        pytest test_register.py -v --html=report.html --self-contained-html

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: report.html