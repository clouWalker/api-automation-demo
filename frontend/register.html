<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
</head>
<body>
    <h2>注册表单</h2>
    <form id="registerForm">
        <label>邮箱：</label>
        <input type="email" id="email" name="email" required><br><br>
        <label>密码：</label>
        <input type="password" id="password" name="password" required><br><br>
        <button type="button" id="registerBtn">注册</button>
    </form>
    <div id="message"></div>

    <script>
        document.getElementById('registerBtn').addEventListener('click',function () {
            const email = document.getElementById('email').value;
            const password =document.getElementById('password').value;

            fetch('http://localhost:3000/users',{
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email:email,password:password})
            })
                .then(response => response.json())
                .then(data =>{
                    if(data.id){
                        document.getElementById('message').innerText = '注册成功！用户ID：'+data.id;
                    }else if(data.error){
                        document.getElementById('message').innerText = '错误:'+data.error;
                    }
                })
                .catch(error =>{
                    document.getElementById('message').innerText ='请求失败：'+error;
                });
        });
    </script>
</body>
</html>
